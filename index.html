<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KiLROY Leadership Academy — Business Success</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #fafaf8;
    color: #1a1a1a;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: white;
    border-bottom: 1px solid #ebe9e4;
    padding: 0 28px;
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-logo {
    font-weight: 800;
    font-size: 20px;
    color: #FF4713;
    letter-spacing: -0.5px;
  }

  .brand-sep {
    width: 1px;
    height: 20px;
    background: #e0ddd8;
  }

  .brand-text {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    letter-spacing: 0.2px;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .meta-pill {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #FF4713;
    background: #fff5f2;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid #ffe0d6;
  }

  .meta-date {
    font-size: 12px;
    color: #aaa;
    font-weight: 500;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    margin-top: 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 10px 20px 12px;
    font-size: 13px;
    font-weight: 600;
    color: #999;
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
    position: relative;
    user-select: none;
  }

  .tab:hover {
    color: #555;
  }

  .tab.active {
    color: #FF4713;
    border-bottom-color: #FF4713;
  }

  .tab .tab-num {
    font-size: 10px;
    font-weight: 700;
    color: #ccc;
    margin-right: 6px;
    letter-spacing: 0.5px;
  }

  .tab.active .tab-num {
    color: #ffb39a;
  }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .content iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: white;
  }

  /* ── LOADING STATE ── */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: #fafaf8;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
    transition: opacity 0.3s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #f0ede8;
    border-top-color: #FF4713;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .loading-text {
    font-size: 12px;
    color: #bbb;
    font-weight: 500;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── PASSWORD GATE ── */
  .gate {
    position: fixed;
    inset: 0;
    background: #fafaf8;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .gate.hidden { display: none; }

  .gate-card {
    background: white;
    border: 1px solid #ebe9e4;
    border-radius: 12px;
    padding: 36px 40px;
    width: 360px;
    max-width: calc(100vw - 32px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    text-align: center;
  }

  .gate-logo {
    font-weight: 800;
    font-size: 22px;
    color: #FF4713;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .gate-sub {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    letter-spacing: 0.2px;
    margin-bottom: 28px;
  }

  .gate-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 10px;
    text-align: left;
  }

  .gate-input {
    width: 100%;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    border: 1px solid #e0ddd8;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
    background: #fafaf8;
  }

  .gate-input:focus {
    border-color: #FF4713;
    background: white;
  }

  .gate-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: white;
    background: #FF4713;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .gate-btn:hover { background: #e63c0f; }

  .gate-error {
    font-size: 12px;
    color: #d63b12;
    margin-top: 12px;
    height: 16px;
    font-weight: 500;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .header { padding: 0 16px; }
    .header-meta { display: none; }
    .tab { padding: 10px 14px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-logo">KiLROY</div>
    <div class="gate-sub">Leadership Academy · Business Success</div>
    <label class="gate-label" for="gate-input">Password</label>
    <input type="password" id="gate-input" class="gate-input" autocomplete="off" autofocus>
    <button class="gate-btn" id="gate-btn">Enter</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<div class="app" id="app" style="display:none;">
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-logo">KiLROY</div>
        <div class="brand-sep"></div>
        <div class="brand-text">Leadership Academy · Business Success</div>
      </div>
      <div class="header-meta">
        <div class="meta-pill">Workshop Tools</div>
        <div class="meta-date">Copenhagen · May 2026</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="content" id="content">
    <div class="loading-overlay" id="loader">
      <div class="spinner"></div>
      <div class="loading-text">Loading module...</div>
    </div>
    <iframe id="frame" title="Module content"></iframe>
  </div>
</div>

<script>
// ── PASSWORD GATE ──
const PASSWORD = 'kilroy2026';
const gate     = document.getElementById('gate');
const gateIn   = document.getElementById('gate-input');
const gateBtn  = document.getElementById('gate-btn');
const gateErr  = document.getElementById('gate-error');
const appEl    = document.getElementById('app');

function tryUnlock() {
  if (gateIn.value === PASSWORD) {
    try { sessionStorage.setItem('kilroy_unlocked', '1'); } catch(e) {}
    unlock();
  } else {
    gateErr.textContent = 'Incorrect password';
    gateIn.value = '';
    gateIn.focus();
  }
}

function unlock() {
  gate.classList.add('hidden');
  appEl.style.display = 'flex';
  init();
}

gateBtn.addEventListener('click', tryUnlock);
gateIn.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });

let alreadyUnlocked = false;
try { alreadyUnlocked = sessionStorage.getItem('kilroy_unlocked') === '1'; } catch(e) {}
if (alreadyUnlocked) unlock();

// ── APP ──
const TABS = [
  { label: 'P&L Simulator',     page: 'pages/pl-simulator.html' },
  { label: 'KPI Simulator',     page: 'pages/kpi-simulator.html' },
  { label: 'Funnel Exercise',   page: 'pages/funnel-exercise.html' },
  { label: 'Pipeline Forecast', page: 'pages/pipeline.html' },
  { label: 'Team Charter',      page: 'pages/team-charter.html' },
  { label: 'Change Canvas',     page: 'pages/change-canvas.html' },
  { label: '4-Frame Model',     page: 'pages/four-frames.html' },
];

let current = -1;
let initialized = false;

function init() {
  if (initialized) return;
  initialized = true;

  const tabsEl = document.getElementById('tabs');
  const frame  = document.getElementById('frame');
  const loader = document.getElementById('loader');

  TABS.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'tab';
    el.innerHTML = `<span class="tab-num">${String(i + 1).padStart(2, '0')}</span>${t.label}`;
    el.onclick = () => activate(i);
    tabsEl.appendChild(el);
  });

  function activate(i) {
    if (i === current) return;
    current = i;

    document.querySelectorAll('.tab').forEach((t, j) => {
      t.classList.toggle('active', j === i);
    });

    loader.classList.remove('hidden');
    frame.src = TABS[i].page;
  }

  frame.addEventListener('load', () => {
    loader.classList.add('hidden');
  });

  activate(0);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' && current < TABS.length - 1) activate(current + 1);
    if (e.key === 'ArrowLeft' && current > 0) activate(current - 1);
  });
}
</script>
</body>
</html>
