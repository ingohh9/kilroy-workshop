<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Forecast Simulator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f3ef; min-height: 100vh; }
  input[type=range] { -webkit-appearance: none; appearance: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #1a1a1a; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,.3); cursor: pointer; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]:focus { border-color: #FF4713 !important; box-shadow: 0 0 0 3px rgba(255,71,19,.12) !important; outline: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const STAGES = [
  { id: "new",             label: "New",             daysToOffer: 20, color: "#d4d4d4", textColor: "#555",    isOffer: false },
  { id: "inProgress",      label: "In Progress",     daysToOffer: 16, color: "#a3a3a3", textColor: "#fff",    isOffer: false },
  { id: "uncovering",      label: "Uncovering",      daysToOffer: 12, color: "#fbbf24", textColor: "#78350f", isOffer: false },
  { id: "upcomingMeeting", label: "Upcoming Meeting", daysToOffer: 8, color: "#fb923c", textColor: "#fff",    isOffer: false },
  { id: "offerCreation",   label: "Offer Creation",  daysToOffer: 4,  color: "#ef4444", textColor: "#fff",    isOffer: false },
  { id: "offerAdj",        label: "Offer Adjustment", daysToOffer: 0, color: "#1a1a1a", textColor: "#fff",    isOffer: true  },
];

function isk(n) {
  if (!n || isNaN(n)) return "0 ISK";
  if (n >= 1e9) return (n/1e9).toFixed(2) + "B ISK";
  if (n >= 1e6) return (n/1e6).toFixed(1) + "M ISK";
  if (n >= 1e3) return (n/1e3).toFixed(0) + "K ISK";
  return n.toFixed(0) + " ISK";
}

function Lever({ label, value, min, max, step, onChange, fmt, color, bench }) {
  const pct  = ((value - min) / (max - min)) * 100;
  const bPct = bench != null ? ((bench - min) / (max - min)) * 100 : null;
  return (
    <div style={{ marginBottom: 15 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:5 }}>
        <span style={{ fontSize:9, fontWeight:700, letterSpacing:2, color:"#999", textTransform:"uppercase" }}>{label}</span>
        <span style={{ fontSize:20, fontWeight:900, color, lineHeight:1 }}>{fmt(value)}</span>
      </div>
      <div style={{ position:"relative", height:8, borderRadius:4, background:"#e8e8e8" }}>
        {bPct != null && <div style={{ position:"absolute", left:`${bPct}%`, top:"50%", transform:"translate(-50%,-50%)", width:2, height:16, background:"#FF4713", opacity:.5, borderRadius:2, zIndex:2 }} />}
        <div style={{ position:"absolute", left:0, top:0, height:"100%", width:`${pct}%`, background:color, borderRadius:4 }} />
        <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(+e.target.value)}
          style={{ position:"absolute", inset:0, width:"100%", height:"100%", opacity:0, cursor:"pointer", zIndex:3, margin:0 }} />
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, color:"#ccc", marginTop:2 }}>
        <span>{fmt(min)}</span>
        {bench != null && <span style={{ color:"#FF4713", fontWeight:700 }}>▲ bench {fmt(bench)}</span>}
        <span>{fmt(max)}</span>
      </div>
    </div>
  );
}

function App() {
  const [pipe, setPipe] = useState({ new:0, inProgress:0, uncovering:0, upcomingMeeting:0, offerCreation:0, offerAdj:0 });
  const [offerISK,  setOfferISK]  = useState(0);
  const [matDays,   setMatDays]   = useState(20);
  const [avgTO,     setAvgTO]     = useState(1500000);
  const [margin,    setMargin]    = useState(25);
  const [hitRate,   setHitRate]   = useState(42);
  const [offerRate, setOfferRate] = useState(60);
  const [lpd,       setLpd]       = useState(4);

  const set = (id, v) => setPipe(p => ({ ...p, [id]: Math.max(0, isNaN(v) ? 0 : v) }));

  const fc = useMemo(() => {
    const hr = hitRate / 100, or = offerRate / 100;
    const adjCount = pipe.offerAdj || 0;
    const adjValue = offerISK > 0 ? offerISK : adjCount * avgTO;
    const bk_adj   = adjCount * hr;
    const rev_adj  = adjValue * hr;
    const gp_adj   = rev_adj * (margin / 100);

    let preMatures = 0;
    const stageDetail = STAGES.filter(s => !s.isOffer).map(s => {
      const scaledDays = Math.round(s.daysToOffer * (matDays / 20));
      const count      = pipe[s.id] || 0;
      const matures    = scaledDays <= 30;
      if (matures) preMatures += count;
      return { ...s, scaledDays, matures, count };
    });

    const bk_pre  = preMatures * or * hr;
    const rev_pre = bk_pre * avgTO;
    const gp_pre  = rev_pre * (margin / 100);

    const cutoff  = Math.max(0, 30 - matDays);
    const newMature = cutoff * lpd;
    const newTotal  = 30 * lpd;
    const bk_new    = newMature * or * hr;
    const rev_new   = bk_new * avgTO;
    const gp_new    = rev_new * (margin / 100);

    const bk_total  = bk_adj  + bk_pre  + bk_new;
    const rev_total = rev_adj + rev_pre + rev_new;
    const gp_total  = gp_adj  + gp_pre  + gp_new;

    const preTotal = STAGES.filter(s=>!s.isOffer).reduce((a,s)=>a+(pipe[s.id]||0),0);
    const allTotal = preTotal + adjCount;
    const ofPct    = allTotal > 0 ? (adjCount / allTotal) * 100 : 0;

    let hLabel, hColor, hDesc;
    if (allTotal === 0) { hLabel="No Data"; hColor="#aaa"; hDesc="Enter your pipeline above"; }
    else if (ofPct >= 25 && ofPct <= 35) { hLabel="Healthy Balance ✓"; hColor="#22c55e"; hDesc="Good mix of offers and pre-offer building"; }
    else if (ofPct > 35) { hLabel="Replenish Pipeline ⚠"; hColor="#f59e0b"; hDesc="Offer-heavy — not enough new leads building"; }
    else { hLabel="Pipeline Building ↗"; hColor="#3b82f6"; hDesc="Strong pre-offer — offer pressure coming"; }

    const runway = (lpd * or) > 0 ? adjCount / (lpd * or) / 7 : 0;

    return { bk_adj, rev_adj, gp_adj, bk_pre, rev_pre, gp_pre, bk_new, rev_new, gp_new,
             bk_total, rev_total, gp_total, preMatures, newMature, newTotal, cutoff,
             health: { ofPct, preTotal, ofTotal: adjCount, allTotal, label: hLabel, color: hColor, desc: hDesc },
             runway, stageDetail };
  }, [pipe, offerISK, matDays, avgTO, margin, hitRate, offerRate, lpd]);

  const card = { background:"white", borderRadius:14, padding:"18px", boxShadow:"0 1px 8px rgba(0,0,0,.06)" };

  return (
    <div>
      {/* HEADER */}
      <div style={{ background:"#1a1a1a", padding:"14px 22px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:9, letterSpacing:3, color:"#FF4713", fontWeight:700, textTransform:"uppercase", marginBottom:3 }}>KiLROY Leadership Academy · Business Success</div>
          <div style={{ fontSize:18, fontWeight:900, color:"white" }}>PIPELINE FORECAST SIMULATOR</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:9, color:"#555", letterSpacing:2, textTransform:"uppercase" }}>Forecast Window</div>
          <div style={{ fontSize:28, fontWeight:900, color:"#FF4713", lineHeight:1 }}>30 DAYS</div>
        </div>
      </div>

      {/* BENCHMARK STRIP */}
      <div style={{ background:"#FF4713", padding:"7px 22px", display:"flex", gap:18, flexWrap:"wrap", alignItems:"center" }}>
        {[["Maturity","20d"],["Avg Turnover","1.5M ISK"],["Margin","25%"],["Hit Rate","42%"],["Offer Rate","60%"],["Leads/Day","4"]].map(([l,v])=>(
          <div key={l} style={{ display:"flex", gap:5, alignItems:"center" }}>
            <span style={{ fontSize:9, color:"rgba(255,255,255,.6)", letterSpacing:1.5, textTransform:"uppercase" }}>{l}</span>
            <span style={{ fontSize:12, fontWeight:800, color:"white" }}>{v}</span>
          </div>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"250px 1fr 270px", gap:14, padding:"16px", maxWidth:1100, margin:"0 auto" }}>

        {/* LEFT: Snapshot */}
        <div style={card}>
          <div style={{ fontSize:9, fontWeight:700, letterSpacing:2.5, color:"#bbb", textTransform:"uppercase", marginBottom:14 }}>Current Pipeline Snapshot</div>
          {STAGES.map(s => (
            <div key={s.id} style={{ marginBottom: s.isOffer ? 0 : 8 }}>
              {s.isOffer && <div style={{ borderTop:"2px dashed #e5e5e5", margin:"10px 0" }} />}
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:6, height:32, borderRadius:3, background:s.color, border:"1px solid rgba(0,0,0,.08)", flexShrink:0 }} />
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:10, fontWeight:600, color:"#444", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{s.label}</div>
                  <div style={{ fontSize:9, color:"#ccc" }}>{s.isOffer ? "Active offers out" : `~${Math.round(s.daysToOffer*(matDays/20))}d to offer`}</div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:3, alignItems:"flex-end" }}>
                  <input type="number" min={0} value={pipe[s.id] || ""} placeholder="0"
                    onChange={e => set(s.id, +e.target.value)}
                    style={{ width:52, padding:"4px 7px", border:"1.5px solid #e5e5e5", borderRadius:7, fontSize:13, fontWeight:700, textAlign:"center", color:"#1a1a1a", fontFamily:"inherit", background:"white" }} />
                  {s.isOffer && (
                    <input type="number" min={0} value={offerISK || ""} placeholder="ISK value"
                      onChange={e => setOfferISK(Math.max(0,+e.target.value||0))}
                      style={{ width:120, padding:"4px 7px", border:"1.5px solid #e5e5e5", borderRadius:7, fontSize:10, textAlign:"right", color:"#888", fontFamily:"inherit", background:"white" }} />
                  )}
                </div>
              </div>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:14 }}>
            <button onClick={()=>{ setPipe({ new:8, inProgress:12, uncovering:6, upcomingMeeting:3, offerCreation:4, offerAdj:7 }); setOfferISK(18174000); }}
              style={{ flex:1, padding:"9px 0", background:"#1a1a1a", border:"none", borderRadius:8, cursor:"pointer", fontSize:10, fontWeight:700, letterSpacing:1.5, color:"white", textTransform:"uppercase" }}>
              ★ Load Example
            </button>
            <button onClick={()=>{ setPipe({ new:0, inProgress:0, uncovering:0, upcomingMeeting:0, offerCreation:0, offerAdj:0 }); setOfferISK(0); }}
              style={{ flex:1, padding:"9px 0", background:"transparent", border:"1.5px solid #e5e5e5", borderRadius:8, cursor:"pointer", fontSize:10, fontWeight:700, letterSpacing:1.5, color:"#bbb", textTransform:"uppercase" }}>
              ↺ Clear
            </button>
          </div>
        </div>

        {/* CENTRE */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

          {/* HEALTH */}
          <div style={card}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
              <div>
                <div style={{ fontSize:9, fontWeight:700, letterSpacing:2.5, color:"#bbb", textTransform:"uppercase", marginBottom:4 }}>Pipeline Health</div>
                <div style={{ fontSize:20, fontWeight:900, color:fc.health.color }}>{fc.health.label}</div>
                <div style={{ fontSize:10, color:"#aaa", marginTop:2 }}>{fc.health.desc}</div>
              </div>
              <div style={{ textAlign:"right", background:"#f9f8f5", borderRadius:10, padding:"10px 14px" }}>
                <div style={{ fontSize:9, color:"#bbb", textTransform:"uppercase", letterSpacing:1 }}>Offer Runway</div>
                <div style={{ fontSize:24, fontWeight:900, color:"#1a1a1a", lineHeight:1 }}>{fc.runway.toFixed(1)}<span style={{ fontSize:11, color:"#aaa" }}> wks</span></div>
                <div style={{ fontSize:9, color:"#ccc", marginTop:2 }}>of offer coverage</div>
              </div>
            </div>
            <div style={{ height:34, borderRadius:8, overflow:"hidden", display:"flex", background:"#f5f5f5", marginBottom:8 }}>
              {fc.health.ofTotal > 0 && (
                <div style={{ width:`${fc.health.ofPct}%`, minWidth:fc.health.ofPct>0?40:0, background:"#1a1a1a", display:"flex", alignItems:"center", justifyContent:"center", transition:"width .4s" }}>
                  {fc.health.ofPct > 8 && <span style={{ fontSize:10, fontWeight:700, color:"white", whiteSpace:"nowrap" }}>{fc.health.ofPct.toFixed(0)}% offers</span>}
                </div>
              )}
              <div style={{ flex:1, background:"#FF4713", display:"flex", alignItems:"center", justifyContent:"center", opacity:.85 }}>
                {fc.health.preTotal > 0 && <span style={{ fontSize:10, fontWeight:700, color:"white", whiteSpace:"nowrap" }}>{(100-fc.health.ofPct).toFixed(0)}% pre-offer</span>}
                {fc.health.allTotal === 0 && <span style={{ fontSize:10, color:"rgba(255,255,255,.4)" }}>Enter pipeline data</span>}
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6 }}>
              {[["< 25% offers","Pipeline building","#3b82f6"],["25–35% offers","Healthy balance ✓","#22c55e"],["> 35% offers","Replenish pipeline","#f59e0b"]].map(([l,d,c])=>(
                <div key={l} style={{ padding:"8px 10px", background:"#f9f8f5", borderRadius:8, borderLeft:`3px solid ${c}` }}>
                  <div style={{ fontSize:10, fontWeight:700, color:"#1a1a1a" }}>{l}</div>
                  <div style={{ fontSize:9, color:"#aaa", marginTop:2 }}>{d}</div>
                </div>
              ))}
            </div>
          </div>

          {/* STAGE MATURITY BARS */}
          <div style={card}>
            <div style={{ fontSize:9, fontWeight:700, letterSpacing:2.5, color:"#bbb", textTransform:"uppercase", marginBottom:12 }}>Stage Maturity — 30-Day Window</div>
            {fc.stageDetail.map(s => {
              const tot = Math.max(fc.health.allTotal, 1);
              const w   = s.count > 0 ? Math.max(6, (s.count/tot)*100) : 0;
              return (
                <div key={s.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                  <div style={{ width:38, textAlign:"right", fontSize:9, color:"#bbb", flexShrink:0 }}>~{s.scaledDays}d</div>
                  <div style={{ flex:1, height:26, background:"#f5f5f5", borderRadius:5, overflow:"hidden", position:"relative" }}>
                    <div style={{ position:"absolute",left:0,top:0,height:"100%",width:`${w}%`,background:s.color,borderRadius:5,transition:"width .4s cubic-bezier(.34,1.56,.64,1)",display:"flex",alignItems:"center",paddingLeft:8,minWidth:w>0?"60px":"0" }}>
                      {s.count > 0 && <span style={{ fontSize:9, fontWeight:600, color:s.textColor, whiteSpace:"nowrap" }}>{s.label}</span>}
                    </div>
                    {s.count === 0 && <span style={{ position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:9,color:"#ddd" }}>{s.label}</span>}
                  </div>
                  <span style={{ fontSize:14, fontWeight:900, width:22, textAlign:"right", color:s.count>0?"#1a1a1a":"#ddd" }}>{s.count}</span>
                  <span style={{ width:14, fontSize:11 }}>{s.count > 0 ? (s.matures ? <span style={{color:"#22c55e"}}>✓</span> : <span style={{color:"#ccc"}}>→</span>) : ""}</span>
                </div>
              );
            })}
            <div style={{ display:"flex", alignItems:"center", gap:6, margin:"8px 0" }}>
              <div style={{ flex:1, borderTop:"2px dashed #e0e0e0" }} />
              <span style={{ fontSize:9, fontWeight:700, color:"#1a1a1a", letterSpacing:1.5 }}>OFFER STAGE</span>
              <div style={{ flex:1, borderTop:"2px dashed #e0e0e0" }} />
            </div>
            {(() => {
              const tot = Math.max(fc.health.allTotal, 1);
              const w   = pipe.offerAdj > 0 ? Math.max(6, (pipe.offerAdj/tot)*100) : 0;
              return (
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                  <div style={{ width:38, textAlign:"right", fontSize:9, color:"#bbb", flexShrink:0 }}>LIVE</div>
                  <div style={{ flex:1, height:32, background:"#f5f5f5", borderRadius:5, overflow:"hidden", position:"relative" }}>
                    <div style={{ position:"absolute",left:0,top:0,height:"100%",width:`${w}%`,background:"#1a1a1a",borderRadius:5,transition:"width .4s",display:"flex",alignItems:"center",paddingLeft:10,minWidth:w>0?"120px":"0" }}>
                      {pipe.offerAdj > 0 && <span style={{ fontSize:9, fontWeight:700, color:"white", whiteSpace:"nowrap" }}>Offer Adj · {isk(offerISK||pipe.offerAdj*avgTO)}</span>}
                    </div>
                    {pipe.offerAdj === 0 && <span style={{ position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:9,color:"#ddd" }}>Offer Adjustment</span>}
                  </div>
                  <span style={{ fontSize:14, fontWeight:900, width:22, textAlign:"right", color:pipe.offerAdj>0?"#1a1a1a":"#ddd" }}>{pipe.offerAdj}</span>
                  <span style={{ width:14 }} />
                </div>
              );
            })()}
            <div style={{ display:"flex", gap:14, padding:"7px 10px", background:"#f9f8f5", borderRadius:8 }}>
              <span style={{ fontSize:9, color:"#aaa" }}><span style={{ color:"#22c55e", fontWeight:700 }}>✓</span> Matures this window</span>
              <span style={{ fontSize:9, color:"#aaa" }}><span style={{ color:"#ccc", fontWeight:700 }}>→</span> Builds next period</span>
            </div>
          </div>

          {/* WINDOW EXPLAINER */}
          <div style={{ ...card, background:"#1a1a1a" }}>
            <div style={{ fontSize:9, fontWeight:700, letterSpacing:2, color:"#555", textTransform:"uppercase", marginBottom:10 }}>New Inflow · Window Cutoff Effect</div>
            <div style={{ height:26, borderRadius:6, overflow:"hidden", display:"flex", marginBottom:10 }}>
              {fc.cutoff > 0
                ? <div style={{ width:`${(fc.cutoff/30)*100}%`, background:"#FF4713", display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <span style={{ fontSize:9, fontWeight:700, color:"white", whiteSpace:"nowrap" }}>Day 1–{fc.cutoff} → mature ✓</span>
                  </div>
                : null}
              <div style={{ flex:1, background:"#2a2a2a", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:9, fontWeight:700, color:"#555", whiteSpace:"nowrap" }}>
                  {fc.cutoff < 30 ? `Day ${fc.cutoff > 0 ? fc.cutoff+1 : 1}–30 → builds next period` : "Maturity > 30d · no new leads mature"}
                </span>
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <div>
                <div style={{ fontSize:9, color:"#FF4713", fontWeight:700, marginBottom:2 }}>Maturing in window</div>
                <div style={{ fontSize:20, fontWeight:900, color:"white", lineHeight:1 }}>{fc.newMature.toFixed(0)} leads</div>
                <div style={{ fontSize:9, color:"#555", marginTop:2 }}>{lpd}/day × {fc.cutoff} days</div>
              </div>
              <div>
                <div style={{ fontSize:9, color:"#555", fontWeight:700, marginBottom:2 }}>Building next period</div>
                <div style={{ fontSize:20, fontWeight:900, color:"#444", lineHeight:1 }}>{(30*lpd - fc.newMature).toFixed(0)} leads</div>
                <div style={{ fontSize:9, color:"#444", marginTop:2 }}>{lpd}/day × {30 - fc.cutoff} days</div>
              </div>
            </div>
          </div>
        </div>

        {/* RIGHT: Levers + Forecast */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div style={card}>
            <div style={{ fontSize:9, fontWeight:700, letterSpacing:2.5, color:"#bbb", textTransform:"uppercase", marginBottom:14 }}>Levers</div>
            <Lever label="Lead maturity (days to offer)" value={matDays}   min={5}      max={45}      step={1}      onChange={setMatDays}   fmt={v=>`${v}d`}              color="#FF4713" bench={20} />
            <Lever label="Avg turnover per booking"      value={avgTO}     min={500000} max={6000000} step={100000} onChange={setAvgTO}     fmt={v=>`${(v/1e6).toFixed(1)}M`} color="#FF4713" bench={1500000} />
            <Lever label="Avg gross margin"              value={margin}    min={5}      max={50}      step={1}      onChange={setMargin}    fmt={v=>`${v}%`}              color="#1a1a1a" bench={25} />
            <Lever label="Hit rate (offer → booking)"   value={hitRate}   min={10}     max={80}      step={1}      onChange={setHitRate}   fmt={v=>`${v}%`}              color="#1a1a1a" bench={42} />
            <Lever label="Offer rate (lead → offer)"    value={offerRate} min={20}     max={90}      step={1}      onChange={setOfferRate} fmt={v=>`${v}%`}              color="#1a1a1a" bench={60} />
            <Lever label="Leads incoming per day"       value={lpd}       min={1}      max={20}      step={1}      onChange={setLpd}       fmt={v=>`${v}/d`}             color="#FF4713" bench={4} />
            <div style={{ fontSize:9, color:"#ddd", marginTop:2 }}>Orange ▏= benchmark value</div>
          </div>

          {/* FORECAST */}
          <div style={{ ...card, border:"3px solid #1a1a1a" }}>
            <div style={{ fontSize:9, fontWeight:700, letterSpacing:2.5, color:"#bbb", textTransform:"uppercase", marginBottom:12 }}>30-Day Forecast</div>
            <div style={{ background:"#1a1a1a", borderRadius:10, padding:"14px", textAlign:"center", marginBottom:10 }}>
              <div style={{ fontSize:9, color:"#555", letterSpacing:2, textTransform:"uppercase", marginBottom:4 }}>Estimated Bookings</div>
              <div style={{ fontSize:52, fontWeight:900, color:"white", lineHeight:1 }}>{fc.bk_total.toFixed(1)}</div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
              <div style={{ background:"#f9f8f5", borderRadius:10, padding:"10px 12px" }}>
                <div style={{ fontSize:9, color:"#bbb", textTransform:"uppercase", letterSpacing:1 }}>Revenue</div>
                <div style={{ fontSize:15, fontWeight:900, color:"#1a1a1a" }}>{isk(fc.rev_total)}</div>
              </div>
              <div style={{ background:"#f0fdf4", borderRadius:10, padding:"10px 12px", border:"1px solid #bbf7d0" }}>
                <div style={{ fontSize:9, color:"#86efac", textTransform:"uppercase", letterSpacing:1 }}>Gross Profit</div>
                <div style={{ fontSize:15, fontWeight:900, color:"#16a34a" }}>{isk(fc.gp_total)}</div>
              </div>
            </div>
            <div style={{ borderTop:"1px solid #f0f0f0", paddingTop:12 }}>
              <div style={{ fontSize:9, fontWeight:700, letterSpacing:2, color:"#ccc", textTransform:"uppercase", marginBottom:8 }}>By Source</div>
              {[
                { label:"Existing offers",    c:"#1a1a1a", bk:fc.bk_adj, rev:fc.rev_adj, desc:`${pipe.offerAdj} offers × ${hitRate}% hit rate` },
                { label:"Pre-offer pipeline", c:"#FF4713", bk:fc.bk_pre, rev:fc.rev_pre, desc:`${fc.preMatures} leads mature in window` },
                { label:"New inflow (window)",c:"#f59e0b", bk:fc.bk_new, rev:fc.rev_new, desc:`${fc.newMature.toFixed(0)} of ${30*lpd} incoming leads` },
              ].map(src => (
                <div key={src.label} style={{ display:"flex", alignItems:"flex-start", gap:8, marginBottom:8, padding:"9px 10px", background:"#f9f8f5", borderRadius:8 }}>
                  <div style={{ width:3, borderRadius:2, background:src.c, alignSelf:"stretch", flexShrink:0 }} />
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between" }}>
                      <span style={{ fontSize:10, fontWeight:700, color:"#1a1a1a" }}>{src.label}</span>
                      <span style={{ fontSize:13, fontWeight:900, color:src.c }}>{src.bk.toFixed(1)}</span>
                    </div>
                    <div style={{ fontSize:9, color:"#aaa", marginTop:1 }}>{src.desc}</div>
                    <div style={{ fontSize:9, color:"#bbb" }}>{isk(src.rev)}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
